    <!-- <model-viewer> HTML element -->
    <div class="container">
    <model-viewer src="apartment_02.glb" id="apartment" ar ar-modes="webxr scene-viewer quick-look" camera-controls poster="poster.webp" shadow-intensity="0" shadow-softness="1" tone-mapping="commerce" camera-orbit="-48.1deg 48.49deg 2.229m" field-of-view="30deg" min-camera-orbit="auto 0deg auto" max-camera-orbit="auto 76deg auto" ondblclick="resetCamera()">
        <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
          </div>
          <button slot="ar-button" id="ar-button" style="
            font-family: Montserrat, sans-serif;
            line-height: 37px;
            text-align: center;
            justify-content: center;
            display: -webkit-flex;
            font-size: 15px;
            width: 40px;
            cursor: pointer;
            color: #70757a;
            background-color: #fff;
            border-radius: 24px;
            box-shadow: 0px 4px 8px 0px rgba(0, 0, 0, 0.20000000298023224);
            border-width : 0;
            position: absolute;
            top: 10px;
            right: 10px;">AR</button>
          <div id="ar-prompt">
            <img src="ar_hand_prompt.png">
          </div>
    </model-viewer>
            <!--AR button with pop up-->
            <button class="ARbutton" slot="ar-button" id="ARbutton" title="View in your space" onclick="showPopup()">AR</button>
    
            <div id="popup" class="popup" onclick="hidePopup()">
              <div class="popup-content">
                <span class="close" onclick="hidePopup()">×</span>
                <div id="qrcode"></div>
                <p>Scan the code using your phone to start the experience in AR</p>
                <script>
                  document.addEventListener('keydown', function (event) {
                    if (event.key === 'Escape') {
                      hidePopup();
                    } else if (event.key === 'Enter') {
                      hidePopup();
                    }
                  });
        
                  function hidePopup() {
                    var popup = document.getElementById('popup');
                    popup.style.display = 'none';
                  }
        
                  function hidePopup() {
                    // Perform submit action or any other desired action
                    console.log('Submit action performed');
                  }
                </script>
              </div>
            </div>
            <!--AR button with pop up End-->
        <!-- desktop ui -->
        <div class="textcontainer">
            <div class="text" onclick="vis01()">Living room</div>
            <div class="text" onclick="vis02()">Open kitchen</div>
            <div class="text" onclick="vis03()">Bedroom</div>
            <div class="text" onclick="vis04()">Toilet</div>
          </div>
  
          <div class="heading" id="heading">
          <div class="Htext" id="heading01">Living room</div>
          <div class="Htext" id="heading02">Open kitchen</div>
          <div class="Htext" id="heading03">Bedroom</div>
          <div class="Htext" id="heading04">Toilet</div>
        </div>
  
          <div class="textcontainericon" id="textcontainericon">
              <div class="texticon" onclick="vis01(),heading01()"><img src="img/icons/vis01.png"></div>

              <div class="texticon" onclick="vis03(),heading03()"><img src="img/icons/vis03.png"></div>
              <div class="texticon" onclick="vis04(),heading04()"><img src="img/icons/vis04.png"></div>
