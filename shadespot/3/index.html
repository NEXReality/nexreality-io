<!doctype html>
<html lang="en">
  <head>
    <title>shadespot</title>
    <meta charset="utf-8">
    <meta name="description" content="shadespot">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="3_1.gltf" id="shadespot" 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls tone-mapping="commerce" poster="poster.webp" 
    camera-orbit="408.5deg 74.21deg 22.81m"
    camera-target="-0.05m 1.72m -0.23m"
    min-field-of-view="1deg"
    max-field-of-view="45deg"
    field-of-view="30deg"
    shadow-softness="0.05"
    shadow-intensity="1"
    ondblclick="resetCamera()">
      <button class="Hotspot" slot="hotspot-1" 
      data-position="-2.260083894895887m 3.39051121483001m -5.087203498335362m"
       data-normal="0.9999999999999578m 0m -2.9054316851657507e-7m" 
       data-visibility-attribute="visible"
       data-orbit="399.1deg 73.43deg 12.37m"
       data-target="-2.20m 3.43m -5.11m">

          <div class="HotspotAnnotation">C</div>
      </button><button class="Hotspot" slot="hotspot-2" 
      data-position="0.06653725466408833m 3.3949806694377163m -5.144611358642579m" 
      data-normal="0m 0m 1m"
      data-visibility-attribute="visible"
      data-orbit="83.83deg 86.36deg 14.55m"
      data-target="-1.08m 3.4m -5.09m">

          <div class="HotspotAnnotation">B</div>
      </button><button class="Hotspot" slot="hotspot-3" 
      data-position="0.05925331846774551m 3.501268518851387m 4.702346194667953m" 
      data-normal="1.0546671420402973e-7m 0m 0.9999999999999944m" 
      data-visibility-attribute="visible"
      data-orbit="92.84deg 84.79deg 13.97m"
      data-target="0.04m 3.43m 4.65m">

          <div class="HotspotAnnotation">A</div>
      </button>
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  </body>
</html>
