<!doctype html>
<html lang="en">
  <head>
    <title>shadespot</title>
    <meta charset="utf-8">
    <meta name="description" content="shadespot">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="4.gltf" id="shadespot" ar-modes="webxr scene-viewer quick-look"
    camera-controls tone-mapping="commerce"
    camera-orbit="408.5deg 74.21deg 22.81m"
    camera-target="-0.05m 1.72m -0.23m"
    min-field-of-view="1deg"
    max-field-of-view="45deg"
    field-of-view="30deg"
    shadow-softness="0.05"
    shadow-intensity="1"
    ondblclick="resetCamera()">
      <button class="Hotspot" slot="hotspot-1" 
      data-position="0.9818317271323984m 3.3802997901233476m -5.1557793617248535m" 
      data-normal="0m 0m 1m" data-visibility-attribute="visible"
      data-orbit="408.5deg 74.21deg 16.03m"
      data-target="0.88m 3.42m -5.12m">
          <div class="HotspotAnnotation">D</div>

      </button><button class="Hotspot" slot="hotspot-2" 
      data-position="-0.5826476949548987m 3.3760456377513823m -5.155779361724852m" 
      data-normal="0m 0m 1m" data-visibility-attribute="visible"
      data-orbit="68.59deg 82.84deg 18.3m"
      data-target="-1.35m 3.42m -5.11m">
          <div class="HotspotAnnotation">B</div>

      </button><button class="Hotspot" slot="hotspot-3" 
      data-position="-2.9844971244080583m 3.3556465301456515m -5.1557793617248535m" 
      data-normal="0m 0m 1m" data-visibility-attribute="visible"
      data-orbit="60.72deg 79.7deg 16.43m"
      data-target="-2.66m 3.4m -5.16m">
          <div class="HotspotAnnotation">C</div>

      </button><button class="Hotspot" slot="hotspot-4" 
      data-position="-0.6113738067363688m 3.4804091056841557m 4.720955276489258m" 
      data-normal="0m 0m 1m" data-visibility-attribute="visible"
      data-orbit="-112deg 83.23deg 17.81m"
      data-target="0.09m 3.41m 4.68m">
          <div class="HotspotAnnotation">A</div>
      </button>
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  </body>
</html>
